apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "hultetvsf-app.fullname" . }}
  labels:
    {{- include "hultetvsf-app.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/name: {{ include "hultetvsf-app.name" . }}
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/name: {{ include "hultetvsf-app.name" . }}
    spec:
      serviceAccountName: {{ include "hultetvsf-app.fullname" . }}-token-updater
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: app
          image: "{{ .Values.image.repository }}:{{ .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.containerPort }}
              name: http
          env:
            - name: PORT
              value: "{{ .Values.containerPort }}"
          volumeMounts:
            - name: google-credentials
              mountPath: /app/google-credentials.json
              subPath: google-credentials.json
              readOnly: true
            - name: tokens
              mountPath: /app/tokens.json
              subPath: tokens.json
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      
      volumes:
        - name: google-credentials
          secret:
            secretName: {{ include "hultetvsf-app.fullname" . }}-google-credentials
        - name: tokens
          secret:
            secretName: {{ include "hultetvsf-app.fullname" . }}-tokens
            optional: true
      
      nodeSelector:
        {{- toYaml .Values.nodeSelector | nindent 8 }}
      tolerations:
        {{- toYaml .Values.tolerations | nindent 8 }}
      affinity:
        {{- toYaml .Values.affinity | nindent 8 }}
