# Production values for hultetvsf-app
# This file should be used with external secrets management

replicaCount: 1

basePath: "/hultetvsf/"

image:
  repository: ghcr.io/hultetvsf/app-hostinger
  tag: "latest"
  pullPolicy: Always

# Single Express server serving static files and API
containerPort: 3000

resources:
  limits:
    memory: "256Mi"
    cpu: "500m"
  requests:
    memory: "128Mi"
    cpu: "100m"

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: true
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$1
    cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: hultet-vsf.se
      paths:
        - path: /hultetvsf/(.*)
          pathType: ImplementationSpecific
  tls:
    - secretName: hultetvsf-app-tls
      hosts:
        - hultet-vsf.se

# Google API credentials
# IMPORTANT: Do not commit actual credentials to Git
# Use one of these methods to manage secrets:
#
# 1. Sealed Secrets (recommended):
#    Create a sealed secret with:
#    kubectl create secret generic hultetvsf-app-google-credentials \
#      --from-file=google-credentials.json=./google-credentials.json \
#      --dry-run=client -o yaml | \
#      kubeseal -o yaml > sealed-secret.yaml
#
# 2. External Secrets Operator:
#    Store credentials in AWS Secrets Manager, Azure Key Vault, etc.
#
# 3. Manual secret creation:
#    kubectl create secret generic hultetvsf-app-google-credentials \
#      --from-file=google-credentials.json=./google-credentials.json
#
# For this example, provide empty values and manage secrets externally
google:
  credentials:
    installed:
      client_id: ""
      project_id: ""
      client_secret: ""
      redirect_uris: ["http://localhost"]

nodeSelector: {}

tolerations: []

affinity: {}
